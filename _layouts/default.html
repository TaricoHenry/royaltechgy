<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="theme-color" content="#f3f2ec" />

  <!-- Open Graph (for FB / WhatsApp) -->
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="{{ '/assets/images/logo.png' | absolute_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/images/logo.svg' | absolute_url }}" />
</head>

<body>
  {{ content }}
  <script>
    window.SITE_CONFIG = {
      siteBaseUrl: "{{ site.baseurl | escape }}",
      whatsappUrl: "{{ site.whatsapp_url | escape }}"
    };
  </script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>

</html>
